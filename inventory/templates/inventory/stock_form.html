{% extends 'base.html' %}
{% block title %}Add Stock — BizManager{% endblock %}
{% block page_title %}Add Stock Entry{% endblock %}
{% block page_subtitle %}Record incoming stock{% endblock %}

{% block content %}
<div class="max-w-xl mx-auto">
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
        <div class="flex items-center gap-3 mb-6">
            <div class="w-10 h-10 card-gradient-blue rounded-xl flex items-center justify-center">
                <i class="fas fa-boxes text-white"></i>
            </div>
            <div>
                <h2 class="text-lg font-bold text-gray-800">Add Stock Entry</h2>
                <p class="text-sm text-gray-500">Record new incoming stock</p>
            </div>
        </div>
        <form method="post">
            {% csrf_token %}
            <div class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1.5">Product *</label>
                    <select name="product" class="form-input" required>
                        <option value="">-- Select Product --</option>
                        {% for product in products %}
                        <option value="{{ product.id }}">{{ product.name }} ({{ product.get_unit_display }})</option>
                        {% endfor %}
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1.5">Quantity *</label>
                    <input type="number" name="quantity" class="form-input" placeholder="Enter quantity" step="0.01" min="0" required>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1.5">Date</label>
                    <input type="date" name="date" value="{{ today|date:'Y-m-d' }}" class="form-input">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1.5">Note (Optional)</label>
                    <input type="text" name="note" class="form-input" placeholder="e.g. Received from supplier...">
                </div>
                <div class="flex gap-3 pt-2">
                    <button type="submit"
                            class="flex-1 bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-xl font-bold transition-colors">
                        <i class="fas fa-save mr-2"></i>Save Entry
                    </button>
                    <a href="{% url 'stock_list' %}"
                       class="px-6 py-3 border border-gray-300 rounded-xl text-gray-600 hover:bg-gray-50 font-medium">
                        Cancel
                    </a>
                </div>
            </div>
        </form>
    </div>
</div>
{% endblock %}
