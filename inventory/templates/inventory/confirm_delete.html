{% extends 'base.html' %}
{% block title %}Delete {{ type }} — BizManager{% endblock %}
{% block page_title %}Delete {{ type }}{% endblock %}

{% block content %}
<div class="max-w-md mx-auto">
    <div class="bg-white rounded-2xl shadow-sm border border-red-100 p-8 text-center">
        <div class="w-16 h-16 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-4">
            <i class="fas fa-trash text-red-500 text-2xl"></i>
        </div>
        <h2 class="text-xl font-bold text-gray-800 mb-2">Delete {{ type }}</h2>
        <p class="text-gray-500 mb-6">Are you sure you want to delete <strong>{{ object }}</strong>? This action cannot be undone.</p>
        <div class="flex gap-3 justify-center">
            <form method="post">
                {% csrf_token %}
                <button type="submit"
                        class="bg-red-600 hover:bg-red-700 text-white px-6 py-2.5 rounded-xl font-semibold transition-colors">
                    <i class="fas fa-trash mr-2"></i>Yes, Delete
                </button>
            </form>
            <a href="javascript:history.back()"
               class="px-6 py-2.5 border border-gray-300 rounded-xl text-gray-600 hover:bg-gray-50 font-medium">
                Cancel
            </a>
        </div>
    </div>
</div>
{% endblock %}
